<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="fbGlow" cx="60%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#FFB23A" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#FF6A12" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6A12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fbCore" cx="60%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="18%" stop-color="#FFF3B0"/>
      <stop offset="42%" stop-color="#FFB627"/>
      <stop offset="70%" stop-color="#FF6A12"/>
      <stop offset="90%" stop-color="#D8350C"/>
      <stop offset="100%" stop-color="#7A1604"/>
    </radialGradient>
    <linearGradient id="fbTrailOuter" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A1604" stop-opacity="0"/>
      <stop offset="40%" stop-color="#C2410C" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF7A1A" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="fbTrailMid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6A12" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF9027" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFD23F" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="fbTrailInner" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB627" stop-opacity="0"/>
      <stop offset="60%" stop-color="#FFD66B" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFF6D2"/>
    </linearGradient>
    <radialGradient id="fbShimmer" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- ambient glow -->
  <circle cx="40" cy="30" r="27" fill="url(#fbGlow)"/>
  <!-- layered trailing flames (orb leads to the right) -->
  <path d="M25,23 C16,18 6,24 2,29 C6,35 17,39 25,37 Z" fill="url(#fbTrailOuter)"/>
  <path d="M28,25 C20,22 14,25 12,29 C14,33 21,36 28,35 Z" fill="url(#fbTrailMid)"/>
  <path d="M32,26 C26,24 21,26 20,29 C21,32 27,34 32,34 Z" fill="url(#fbTrailInner)"/>
  <!-- upward-curling flicker -->
  <path d="M30,23 C24,17 16,15 11,18 C16,22 23,24 30,23 Z" fill="url(#fbTrailMid)" opacity="0.65"/>
  <!-- trailing embers -->
  <circle cx="4" cy="25" r="1.4" fill="#FFD23F" opacity="0.8"/>
  <circle cx="9" cy="36" r="1.1" fill="#FF9027" opacity="0.7"/>
  <circle cx="16" cy="18" r="1" fill="#FFE9A8" opacity="0.65"/>
  <!-- core orb -->
  <circle cx="40" cy="30" r="16.5" fill="url(#fbCore)"/>
  <!-- specular highlight -->
  <ellipse cx="34" cy="23" rx="5.5" ry="4" fill="#FFFBE9" opacity="0.9" transform="rotate(-20 34 23)"/>
  <!-- forward heat shimmer -->
  <circle cx="54" cy="30" r="8" fill="url(#fbShimmer)"/>
</svg>
