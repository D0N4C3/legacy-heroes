<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="burstGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF6D2" stop-opacity="0.85"/>
      <stop offset="38%" stop-color="#FFB627" stop-opacity="0.55"/>
      <stop offset="72%" stop-color="#FF6A12" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF6A12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="burstCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#FFF3B0"/>
      <stop offset="75%" stop-color="#FFB627" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FF7A1A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tongueOuter" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#B8300A"/>
      <stop offset="55%" stop-color="#FF7A1A"/>
      <stop offset="100%" stop-color="#FFD23F"/>
    </linearGradient>
    <linearGradient id="tongueInner" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF9027"/>
      <stop offset="60%" stop-color="#FFD66B"/>
      <stop offset="100%" stop-color="#FFF6D2"/>
    </linearGradient>
  </defs>
  <!-- ambient glow -->
  <circle cx="32" cy="32" r="30" fill="url(#burstGlow)"/>
  <!-- outer flame tongues, alternating long/short for an irregular burst -->
  <g fill="url(#tongueOuter)">
    <path d="M28,33 C25,24 24,14 30,6 C36,13 39,23 36,33 Z"/>
    <path d="M29,33 C27,27 27,20 32,13 C37,19 38,27 35,33 Z" transform="rotate(36 32 32)"/>
    <path d="M28,33 C25,24 24,14 30,6 C36,13 39,23 36,33 Z" transform="rotate(72 32 32)"/>
    <path d="M29,33 C27,27 27,20 32,13 C37,19 38,27 35,33 Z" transform="rotate(108 32 32)"/>
    <path d="M28,33 C25,24 24,14 30,6 C36,13 39,23 36,33 Z" transform="rotate(144 32 32)"/>
    <path d="M29,33 C27,27 27,20 32,13 C37,19 38,27 35,33 Z" transform="rotate(180 32 32)"/>
    <path d="M28,33 C25,24 24,14 30,6 C36,13 39,23 36,33 Z" transform="rotate(216 32 32)"/>
    <path d="M29,33 C27,27 27,20 32,13 C37,19 38,27 35,33 Z" transform="rotate(252 32 32)"/>
    <path d="M28,33 C25,24 24,14 30,6 C36,13 39,23 36,33 Z" transform="rotate(288 32 32)"/>
    <path d="M29,33 C27,27 27,20 32,13 C37,19 38,27 35,33 Z" transform="rotate(324 32 32)"/>
  </g>
  <!-- inner bright tongues, offset between the outer ones -->
  <g fill="url(#tongueInner)">
    <path d="M30,32 C29,28 29,23 32,17 C35,23 35,28 34,32 Z" transform="rotate(18 32 32)"/>
    <path d="M30,32 C29,28 29,23 32,17 C35,23 35,28 34,32 Z" transform="rotate(63 32 32)"/>
    <path d="M30,32 C29,28 29,23 32,17 C35,23 35,28 34,32 Z" transform="rotate(108 32 32)"/>
    <path d="M30,32 C29,28 29,23 32,17 C35,23 35,28 34,32 Z" transform="rotate(153 32 32)"/>
    <path d="M30,32 C29,28 29,23 32,17 C35,23 35,28 34,32 Z" transform="rotate(198 32 32)"/>
    <path d="M30,32 C29,28 29,23 32,17 C35,23 35,28 34,32 Z" transform="rotate(243 32 32)"/>
    <path d="M30,32 C29,28 29,23 32,17 C35,23 35,28 34,32 Z" transform="rotate(288 32 32)"/>
    <path d="M30,32 C29,28 29,23 32,17 C35,23 35,28 34,32 Z" transform="rotate(333 32 32)"/>
  </g>
  <!-- shockwave ring -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="#FFE9A8" stroke-width="1.6" opacity="0.35"/>
  <!-- embers -->
  <circle cx="14" cy="20" r="1.6" fill="#FFD23F" opacity="0.85"/>
  <circle cx="50" cy="18" r="1.2" fill="#FFE9A8" opacity="0.8"/>
  <circle cx="46" cy="48" r="1.8" fill="#FF9027" opacity="0.75"/>
  <circle cx="16" cy="46" r="1.3" fill="#FFD23F" opacity="0.7"/>
  <circle cx="32" cy="9" r="1.2" fill="#FFE9A8" opacity="0.7"/>
  <circle cx="55" cy="34" r="1.4" fill="#FF9027" opacity="0.65"/>
  <!-- bright core flash -->
  <circle cx="32" cy="32" r="11" fill="url(#burstCore)"/>
</svg>
